<style>
  :root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --secondary: #34a853;
    --accent: #fbbc04;
    --danger: #d93025;
    --bg-app: #f8f9fa;
    --sidebar-bg: #ffffff;
    --topbar-bg: #ffffff;
    --text-main: #202124;
    --text-muted: #5f6368;
    --border: #dadce0;
    --sidebar-width: 260px;
    --topbar-height: 64px;
    --shadow: 0 1px 3px rgba(60, 64, 67, 0.3), 0 4px 8px rgba(60, 64, 67, 0.15);
    --radius: 8px;
    --transition: all 0.2s ease-in-out;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: var(--bg-app);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Layout Structure */
  .app-wrapper {
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    height: 100vh;
    z-index: 100;
    transition: var(--transition);
  }

  .sidebar-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo {
    display: block;
    max-width: 180px;
    height: auto;
    margin: 0 auto 20px auto;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .brand-title {
    font-size: 14px;
    font-weight: 800;
    color: var(--text-main);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.2;
  }

  .brand-subtitle {
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
    margin-top: 4px;
  }

  .nav-menu {
    padding: 16px 0;
    flex-grow: 1;
    overflow-y: auto;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    border-left: 4px solid transparent;
  }

  .nav-item:hover {
    background: rgba(26, 115, 232, 0.04);
    color: var(--primary);
  }

  .nav-item.active {
    background: rgba(26, 115, 232, 0.08);
    color: var(--primary);
    border-left-color: var(--primary);
    font-weight: 600;
  }

  .nav-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Main Content Area */
  .main-content {
    flex-grow: 1;
    margin-left: var(--sidebar-width);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* Top Bar */
  .top-bar {
    height: var(--topbar-height);
    background: var(--topbar-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 90;
  }

  .page-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-main);
  }

  .user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-info {
    text-align: right;
  }

  .user-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
  }

  .user-email-small {
    font-size: 11px;
    color: var(--text-muted);
  }

  .avatar {
    width: 36px;
    height: 36px;
    background: #e8f0fe;
    color: var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    border: 1px solid var(--border);
  }

  /* Dashboard View */
  .view-container {
    padding: 32px;
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: white;
    padding: 24px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    cursor: pointer;
    transition: var(--transition);
  }

  .stat-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-4px);
  }

  .stat-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .stat-info h3 {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .stat-info p {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-main);
  }

  /* Loading State */
  .loader {
    display: none;
    position: fixed;
    top: var(--topbar-height);
    left: var(--sidebar-width);
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Utility Classes */
  .bg-blue { background: #1a73e8; }
  .bg-green { background: #34a853; }
  .bg-orange { background: #fbbc04; }
  .bg-red { background: #d93025; }
  .bg-purple { background: #a142f4; }

</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
